<!DOCTYPE html>
<html>
<head>
    <title>Debug Login</title>
</head>
<body>
    <h1>Debug Login</h1>
    <input id="email" value="test3@test.com">
    <input id="password" value="pass">
    <button onclick="test()">Login</button>
    <pre id="out"></pre>
    <script>
    async function test() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const out = document.getElementById('out');
        
        const formData = new FormData();
        formData.append('username', email);
        formData.append('password', password);
        
        out.textContent = 'Sending request...';
        
        // Log the actual request being sent
        const req = new Request('http://localhost:8000/api/auth/login', {
            method: 'POST',
            body: formData
        });
        
        out.textContent += '\nRequest URL: ' + req.url;
        out.textContent += '\nRequest method: ' + req.method;
        
        try {
            const response = await fetch(req);
            out.textContent += '\nStatus: ' + response.status;
            out.textContent += '\nStatusText: ' + response.statusText;
            out.textContent += '\nHeaders: ' + JSON.stringify([...response.headers]);
            const text = await response.text();
            out.textContent += '\nBody: ' + text;
        } catch(e) {
            out.textContent += '\nError: ' + e.message;
        }
    }
    </script>
</body>
</html>

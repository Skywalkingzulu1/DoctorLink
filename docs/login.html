<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Doctors on Wheels</title>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #0052cc;
            --primary-dark: #0747a6;
            --secondary: #00a3bf;
            --light: #f4f5f7;
            --white: #fff;
            --text: #172b4d;
            --border: #dfe1e6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        h1 span { color: var(--secondary); }
        p { color: #6b778c; margin-bottom: 2rem; }
        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        button { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--primary-dark); }
        .error { background: #ffebe6; color: #de350b; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Doctors on <span>Wheels</span></h1>
        <p>Login to your account</p>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <div style="margin-top:2rem; font-size:0.8rem; color: #6b778c; border-top: 1px solid var(--border); padding-top: 1rem;">
            Demo Doctor: sam@docmail.com / test123<br>
            Demo Patient: test3@test.com / pass
        </div>
    </div>

    <script>
        // Use window.API_BASE from config.js, with a hardcoded production fallback
        const BASE_URL = window.API_BASE || 'https://doctorlink-knmy.onrender.com';
        console.log('Doctors on Wheels - API Connection:', BASE_URL);
        
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorDiv = document.getElementById('error');
            
            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            errorDiv.style.display = 'none';
            
            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                console.log('Attempting login for:', email);
                
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
                
                const res = await fetch(BASE_URL + '/api/auth/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Login failed');
                }
                
                const data = await res.json();
                console.log('Login successful, received token.');
                localStorage.setItem('token', data.access_token);
                
                // Fetch full user info to confirm session and role
                const userRes = await fetch(BASE_URL + '/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + data.access_token }
                });
                
                if (!userRes.ok) throw new Error('Failed to retrieve user profile');
                
                const user = await userRes.json();
                console.log('User profile loaded:', user.name, 'Role:', user.role);
                
                if (user.role === 'DOCTOR') {
                    window.location.href = 'doctor_dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        };
    </script>
</body>
</html>

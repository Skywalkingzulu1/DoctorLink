<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoco Secure Checkout</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f4f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .checkout-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; color: #1a1a1a; margin-bottom: 20px; }
        .logo span { color: #0052cc; }
        .amount { font-size: 36px; font-weight: 800; color: #1a1a1a; margin: 20px 0; }
        .details { font-size: 14px; color: #666; margin-bottom: 30px; }
        .btn { background: #1a1a1a; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #333; }
        .secure-badge { margin-top: 20px; font-size: 12px; color: #888; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .alert { background: #fff3e0; color: #e65100; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="checkout-box">
    <div class="logo">Doctors on <span>Wheels</span></div>
    
    <div class="alert" id="demoAlert">
        <strong>Test Mode Active:</strong> Your Yoco account returned a 403 Forbidden error (Online Payments not enabled). This is a simulated checkout to allow you to complete the booking flow.
    </div>

    <div class="details">You are paying Doctors on Wheels for Consultation</div>
    <div class="amount" id="displayAmount">R0.00</div>

    <button class="btn" id="payBtn" onclick="processPayment()">Pay Now</button>

    <div class="secure-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L3 6v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V6l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V8.1l7-3.11v7z"/></svg>
        Secured by Yoco
    </div>
</div>

<script src="config.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amount') || '800';
    const txId = urlParams.get('transaction_id');
    const apptId = urlParams.get('appt_id');
    const errorMsg = urlParams.get('yoco_error');

    document.getElementById('displayAmount').textContent = 'R' + Number(amount).toFixed(2);

    if (errorMsg) {
        document.getElementById('demoAlert').innerHTML = `<strong>API Blocked:</strong> Yoco returned: ${errorMsg.replace(/_/g, ' ')}. Using simulation block.`;
    }

    async function processPayment() {
        const btn = document.getElementById('payBtn');
        btn.textContent = 'Processing...';
        btn.disabled = true;

        try {
            // Trigger the webhook locally since we bypassed Yoco
            await fetch(window.API_BASE + '/api/yoco/webhook', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: "payment.succeeded",
                    payload: { metadata: { transaction_id: txId } }
                })
            });

            btn.textContent = 'Payment Successful ✓';
            btn.style.background = '#36b37e';

            // Redirect back to dashboard to trigger SOAP redirect
            setTimeout(() => {
                window.location.href = `index.html?payment=success&appt=${apptId}`;
            }, 1500);

        } catch (e) {
            alert("Error simulating payment: " + e.message);
            btn.textContent = 'Pay Now';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
